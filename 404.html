<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>페이지를 찾을 수 없습니다 | 메디커넥트</title>
  <meta name="robots" content="noindex, follow">
  <script>
    (function () {
      var path = window.location.pathname;
      var search = window.location.search || "";
      var hash = window.location.hash || "";
      var cleaned = path
        .replace(/(?:%C2%A0|\u00A0|%20|\s)+$/gi, "")
        .replace(/\/+$/, "/");

      if (cleaned !== path) {
        window.location.replace(cleaned + search + hash);
      }
    })();
  </script>
  <style>
    body{margin:0;background:#02050a;color:#f8fafc;font-family:Arial,'Malgun Gothic',sans-serif;line-height:1.7}
    main{max-width:720px;margin:0 auto;padding:80px 24px}
    a{color:#93c5fd;font-weight:700}
  </style>
</head>
<body>
  <main>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>주소 끝에 공백이 붙었거나 페이지 주소가 변경되었을 수 있습니다.</p>
    <p><a href="/">메디커넥트 홈으로 이동</a></p>
  </main>
</body>
</html>
